server {
  listen 80;
  listen [::]:80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Cache estáticos immutable (Vite añade hash a los nombres)
  location /assets/ {
    try_files $uri =404;
    access_log off;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  # SPA: todas las rutas sirven index.html para react-router (client-side)
  location / {
    try_files $uri $uri/ /index.html;
  }
}
